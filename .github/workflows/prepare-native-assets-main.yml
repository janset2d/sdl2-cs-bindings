name: Prepare Native Assets

on:
  # push: { branches: [master] }
  # pull_request: { branches: [master] }
  workflow_dispatch:

jobs:
  ###############################################################################
  #  WINDOWS BUILDS
  ###############################################################################
  windows:
    uses: ./.github/workflows/prepare-native-assets-windows.yml
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        triplet: [x64-windows-hybrid, x86-windows-hybrid, arm64-windows-hybrid]
        include:
          - triplet: x64-windows-hybrid
            rid: win-x64
            runner: windows-latest
          - triplet: x86-windows-hybrid
            rid: win-x86
            runner: windows-latest
          - triplet: arm64-windows-hybrid
            rid: win-arm64
            runner: windows-latest
    with:
      # Pass matrix values to the reusable workflow inputs
      triplet: ${{ matrix.triplet }}
      rid: ${{ matrix.rid }}
      runner: ${{ matrix.runner }} # Pass the selected runner
      # Pass vcpkg config
      vcpkg-cache-path: .vcpkg-cache
      vcpkg-feature-flags: binarycaching

  ###############################################################################
  #  LINUX BUILDS
  ###############################################################################
  linux:
    uses: ./.github/workflows/prepare-native-assets-linux.yml
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        triplet: [x64-linux-hybrid, arm64-linux-hybrid]
        include:
          - triplet: x64-linux-hybrid
            rid: linux-x64
            runner: ubuntu-24.04
            container_image: ubuntu:20.04
          - triplet: arm64-linux-hybrid
            rid: linux-arm64
            runner: ubuntu-24.04-arm
            container_image: ubuntu:24.04
    with:
      # Pass matrix values to the reusable workflow inputs
      triplet: ${{ matrix.triplet }}
      rid: ${{ matrix.rid }}
      runner: ${{ matrix.runner }}
      container-image: ${{ matrix.container_image }}
      # Pass vcpkg config
      vcpkg-cache-path: .vcpkg-cache
      vcpkg-feature-flags: binarycaching

  ################################################################################
  #  MACOS BUILDS
  ################################################################################
  macos:
    uses: ./.github/workflows/prepare-native-assets-macos.yml
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        triplet: [x64-osx-hybrid, arm64-osx-hybrid]
        include:
          - triplet: x64-osx-hybrid
            rid: osx-x64
            runner: macos-15-intel
          - triplet: arm64-osx-hybrid
            rid: osx-arm64
            runner: macos-latest
    with:
      # Pass matrix values to the reusable workflow inputs
      triplet: ${{ matrix.triplet }}
      rid: ${{ matrix.rid }}
      runner: ${{ matrix.runner }} # Pass the selected runner
      # Pass vcpkg config
      vcpkg-cache-path: .vcpkg-cache
      vcpkg-feature-flags: binarycaching
