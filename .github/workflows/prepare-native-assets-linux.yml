name: Prepare Native Assets for Linux

on:
  workflow_call:
    inputs:
      triplet:
        required: true
        type: string
      rid:
        required: true
        type: string
      vcpkg-cache-path:
        required: true
        type: string
      vcpkg-feature-flags:
        required: true
        type: string
      runner:
        required: true
        type: string
      container-image:
        required: true
        type: string

jobs:
  native:
    name: Build Linux (${{ inputs.triplet }} on ${{ inputs.container-image }})
    runs-on: ${{ inputs.runner }}
    container: ${{ inputs.container-image }}
    defaults: { run: { shell: bash } }
    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Install Build Prerequisites
        run: |
          apt-get update
          # core build tools + generic libs
          apt-get install -y --no-install-recommends \
          git wget curl build-essential pkg-config tar unzip zip ca-certificates \
          python3 python3-pip python3-venv python3-jinja2 bison autoconf automake \
          autoconf-archive libltdl-dev libtool

          # SDL2 video/audio back-ends
          apt-get install -y --no-install-recommends \
          libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev \
          libxi-dev libxss-dev libxrender-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols libegl1-mesa-dev libdrm-dev \
          libvulkan-dev libasound2-dev

          # native-smoke runtime prereqs: SDL_mixer's bundled internal Timidity only
          # registers the MIDI decoder when it finds a GUS-format (.pat) patch set at
          # init. The `freepats` apt package ships GUS patches + `/etc/timidity/freepats.cfg`,
          # which SDL_mixer's bundled Timidity auto-searches via its TIMIDITY_CFG_FREEPATS
          # fallback (see src/codecs/music_timidity.c). The alternative `timidity` apt
          # package ships FluidR3_GM.sf2 soundfont via a `%font` cfg directive — bundled
          # Timidity does NOT parse SF2 binaries, so that package alone does not register
          # the MIDI decoder. Keep this step in place even though this workflow currently
          # runs Harvest only — when native-smoke is wired into CI on Linux this prereq
          # must already be present for Mix decoder: MIDI to pass.
          # See docs/playbook/cross-platform-smoke-validation.md + vcpkg-overlay-ports/README.md.
          apt-get install -y --no-install-recommends freepats

          apt-get install -y $(apt-cache search '^libicu[0-9]+$' | head -1 | cut -d' ' -f1)
          update-ca-certificates

          # gperf 3.3 (transitive dep via harfbuzz) requires autoconf >= 2.70.
          # ubuntu:20.04 ships 2.69 — install 2.72 from source. refs #77
          SYSTEM_AUTOCONF_VER=$(autoconf --version 2>/dev/null | head -1 | grep -oP '\d+\.\d+' || echo "0.0")
          if [ "$(printf '%s\n' "2.70" "$SYSTEM_AUTOCONF_VER" | sort -V | head -1)" != "2.70" ]; then
            echo "::group::Installing autoconf 2.72 from source (system has $SYSTEM_AUTOCONF_VER)"
            AUTOCONF_SHA256="afb181a76e1ee72832f6581c0eddf8df032b83e2e0239ef79ebedc4467d92d6e"
            curl -fsSL -o /tmp/autoconf-2.72.tar.gz https://ftp.gnu.org/gnu/autoconf/autoconf-2.72.tar.gz
            echo "$AUTOCONF_SHA256  /tmp/autoconf-2.72.tar.gz" | sha256sum -c -
            tar xz -C /tmp -f /tmp/autoconf-2.72.tar.gz
            cd /tmp/autoconf-2.72 && ./configure --prefix=/usr && make -j"$(nproc)" && make install
            cd "$GITHUB_WORKSPACE"
            echo "autoconf version now: $(autoconf --version | head -1)"
            echo "::endgroup::"
          fi
        env: { DEBIAN_FRONTEND: noninteractive }

      - uses: actions/checkout@v6
        with: { submodules: recursive, fetch-depth: 0 }

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "$(pwd)"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Run Vcpkg Setup Action
        uses: ./.github/actions/vcpkg-setup
        with:
          cache-key-base: ${{ inputs.container-image }}-rebuild-with-full-deps
          triplet: ${{ inputs.triplet }}
          vcpkg-cache-path: ${{ inputs.vcpkg-cache-path }}
          vcpkg-feature-flags: ${{ inputs.vcpkg-feature-flags }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-${{ inputs.container-image }}-${{ hashFiles('./build/_build/packages.lock.json') }}
          restore-keys: |
            nuget-${{ inputs.container-image }}-

      - name: Restore Cake host packages
        run: dotnet restore ./build/_build/Build.csproj --use-lock-file

      - name: Build Cake host
        run: dotnet build ./build/_build/Build.csproj --configuration Release --no-restore

      - name: Run Cake Build (Harvest Task)
        run: >
          ./build/_build/bin/Release/net9.0/Build --target Harvest
          --library SDL2 --library SDL2_image --library SDL2_mixer --library SDL2_ttf --library SDL2_gfx --library SDL2_net
          --rid ${{ inputs.rid }} --repo-root "$(pwd)"

      - name: Upload Harvested Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: harvested-assets-linux-${{ inputs.rid }}
          path: artifacts/harvest_output/
          if-no-files-found: error
          retention-days: 7
