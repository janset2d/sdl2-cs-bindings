# Janset.SDL2 / Janset.SDL3 release pipeline.
#
# CI stays thin here: jobs build the Cake host once, move artifacts between stages,
# and invoke a single Cake target for each behavior boundary.
#
# Current flow:
# - build-cake-host builds, tests, coverage-checks, and publishes the Cake host artifact.
# - resolve-versions writes artifacts/resolve-versions/versions.json.
# - preflight validates manifest and packaging invariants against that resolved mapping.
# - generate-matrix emits the RID matrix from build/manifest.json.
# - harvest runs Harvest and NativeSmoke per RID, then uploads per-RID harvest output.
# - consolidate-harvest merges the per-RID harvest artifacts.
# - pack creates the nupkg set from consolidated harvest output and versions.json.
# - consumer-smoke re-enters the same RID matrix to install and test the packed artifacts.
#
# Staging publish is live for explicit dispatch and release tags. Public publish remains
# disabled until PD-7 promotion-to-nuget.org logic lands.

name: Release

on:
  push:
    tags:
      - 'sdl2-*-*.*.*'    # targeted family release (e.g., sdl2-core-2.32.0)
      - 'sdl3-*-*.*.*'    # targeted family release, SDL3 line (future)
      - 'train-*'         # coordinated multi-family release tag
  workflow_dispatch:
    inputs:
      mode:
        description: 'Version source: manifest-derived | explicit'
        type: choice
        required: true
        default: manifest-derived
        options:
          - manifest-derived
          - explicit
      explicit-versions:
        description: 'For mode=explicit: sdl2-core=2.32.0,sdl2-image=2.8.0,... (repeated --explicit-version shape)'
        required: false
      publish-staging:
        description: 'Run the publish-staging job (push nupkgs to GitHub Packages). Gated until first witness validates the e2e flow against the real feed.'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: read

jobs:
  build-cake-host:
    # Build, test, coverage-check, and publish the Cake host once per workflow run.
    # Downstream jobs download the same framework-dependent artifact and invoke
    # `dotnet ./cake-host/Build.dll --target X` instead of rebuilding the host.
    # vcpkg submodules are skipped here because this job never runs Harvest or NativeSmoke.
    # ~30s per run at the cost of debug-time confusion about which commit's host
    # ran.
    name: Build + Test Cake Host
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/nuget-cache
      - name: Enable TUnit HTML report auto-upload
        # TUnit generates `TestResults/{Assembly}-{os}-{tfm}-report.html` by
        # default and uploads it as a workflow artifact IF these two GitHub
        # Actions runtime env vars are exposed. Option A from
        # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
        # — removes the need for a manual actions/upload-artifact step for the
        # report. Matrix jobs auto-deduplicate via the OS/TFM in the filename.
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Restore Build.Tests (transitive covers Build.csproj)
        # Targeted to the test project — NOT a solution-wide restore. `build/build.sln`
        # currently carries only Build + Build.Tests but future additions (extra test
        # projects, samples) would pull in work we don't want here. Build.Tests
        # ProjectReference'es Build.csproj so its restore graph covers the Cake host.
        run: dotnet restore build/_build.Tests/Build.Tests.csproj
      - name: Test Cake host (with coverage)
        # TUnit + MTP `--coverage` cobertura output path must be absolute; with a
        # relative path MTP writes under the test executable's bin dir instead of
        # the repo-root-relative path CoverageCheckTaskRunner expects.
        run: >
          dotnet test build/_build.Tests/Build.Tests.csproj
          --configuration Release
          --no-restore
          --
          --coverage
          --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/artifacts/test-results/build-tests/coverage.cobertura.xml
      - name: Publish Cake host (FDD, cross-OS)
        run: >
          dotnet publish build/_build/Build.csproj
          --configuration Release
          --no-restore
          -p:UseAppHost=false
          --output ./out/cake-host
      - name: Coverage-Check (ratchet against build/coverage-baseline.json)
        run: dotnet ./out/cake-host/Build.dll --target Coverage-Check
      - name: Upload cake-host artifact
        uses: actions/upload-artifact@v7
        with:
          name: cake-host
          path: ./out/cake-host
          if-no-files-found: error
          retention-days: 1
      # TUnit HTML report uploads itself via ACTIONS_RUNTIME_TOKEN exported above;
      # we only need to surface the cobertura coverage xml manually since the
      # Coverage-Check gate consumes it and a human reader may want the raw data.
      - name: Upload coverage artifact (cobertura xml)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: artifacts/test-results/build-tests/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

  resolve-versions:
    # Emit artifacts/resolve-versions/versions.json once so downstream jobs reuse
    # the same family/version mapping instead of resolving versions independently.
    name: Resolve Versions
    needs: [build-cake-host]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Resolve manifest-derived dispatch versions
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'manifest-derived' }}
        run: >
          dotnet ./cake-host/Build.dll
          --target ResolveVersions
          --version-source=manifest
          --suffix=ci.${{ github.run_id }}.${{ github.run_attempt }}
      - name: Resolve explicit dispatch versions
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'explicit' }}
        shell: bash
        env:
          EXPLICIT_VERSIONS: ${{ inputs.explicit-versions }}
        run: |
          explicit_args=()
          IFS=',' read -ra entries <<< "${EXPLICIT_VERSIONS}"
          for raw in "${entries[@]}"; do
            entry="${raw#"${raw%%[![:space:]]*}"}"
            entry="${entry%"${entry##*[![:space:]]}"}"
            if [ -n "$entry" ]; then
              explicit_args+=(--explicit-version "$entry")
            fi
          done

          if [ "${#explicit_args[@]}" -eq 0 ]; then
            echo "::error::mode=explicit requires workflow_dispatch input explicit-versions."
            exit 1
          fi

          dotnet ./cake-host/Build.dll \
            --target ResolveVersions \
            --version-source=explicit \
            "${explicit_args[@]}"
      - name: Resolve targeted family tag versions
        if: ${{ github.event_name == 'push' && (startsWith(github.ref_name, 'sdl2-') || startsWith(github.ref_name, 'sdl3-')) }}
        run: >
          dotnet ./cake-host/Build.dll
          --target ResolveVersions
          --version-source=git-tag
          --scope ${{ github.ref_name }}
      - name: Resolve coordinated train tag versions
        if: ${{ github.event_name == 'push' && startsWith(github.ref_name, 'train-') }}
        run: >
          dotnet ./cake-host/Build.dll
          --target ResolveVersions
          --version-source=meta-tag
      - name: Upload versions.json
        uses: actions/upload-artifact@v7
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions/versions.json
          if-no-files-found: error
          retention-days: 7

  preflight:
    # Validate manifest and packaging invariants against the resolved version mapping.
    name: PreFlight
    needs: [build-cake-host, resolve-versions]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run PreFlightCheck
        run: >
          dotnet ./cake-host/Build.dll
          --target PreFlightCheck
          --versions-file artifacts/resolve-versions/versions.json

  generate-matrix:
    # Emit the RID matrix from build/manifest.json. Harvest and consumer-smoke
    # both consume this output so they stay aligned on runners, triplets, and containers.
    name: Generate Matrix
    needs: [build-cake-host]
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Emit matrix JSON
        run: >
          dotnet ./cake-host/Build.dll
          --target GenerateMatrix
      - name: Expose matrix as job output
        id: matrix
        run: |
          # GitHub Actions matrix expansion reads the include[] array verbatim.
          matrix_json=$(jq -c . artifacts/matrix/runtimes.json)
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"
      - name: Upload matrix artifact
        uses: actions/upload-artifact@v7
        with:
          name: generate-matrix-output
          path: artifacts/matrix/runtimes.json
          retention-days: 7

  harvest:
    # Run Harvest and NativeSmoke on the same runner so the harvested native output
    # stays on disk between steps and only the final harvest artifact is uploaded.
    name: Harvest + NativeSmoke (${{ matrix.rid }})
    needs: [build-cake-host, preflight, generate-matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/platform-build-prereqs
      - uses: ./.github/actions/vcpkg-setup
        with:
          # Single execution-surface identity: host jobs use the runner label, container
          # jobs use the declared image ref. vcpkg-setup decides whether to resolve the
          # value to an immutable digest by probing the current job-container environment.
          platform-identity: ${{ matrix.container_image || matrix.runner }}
          triplet: ${{ matrix.triplet }}
          vcpkg-cache-path: .vcpkg-cache
          vcpkg-feature-flags: binarycaching
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Cake Info
        run: >
          dotnet ./cake-host/Build.dll
          --target Info
          --rid ${{ matrix.rid }}
      - name: Run Harvest
        run: >
          dotnet ./cake-host/Build.dll
          --target Harvest
          --rid ${{ matrix.rid }}
      - name: Run NativeSmoke
        # Harvest output is already on disk, so NativeSmoke runs immediately after
        # Harvest without an artifact round-trip.
        run: >
          dotnet ./cake-host/Build.dll
          --target NativeSmoke
          --rid ${{ matrix.rid }}
      - name: Upload harvest output
        uses: actions/upload-artifact@v7
        with:
          name: harvest-output-${{ matrix.rid }}
          path: artifacts/harvest_output
          retention-days: 7

  consolidate-harvest:
    # Download every per-RID harvest artifact, then run ConsolidateHarvest once to
    # merge cross-RID outputs and shared evidence.
    name: ConsolidateHarvest
    needs: [build-cake-host, harvest]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download every RID's harvest output
        uses: actions/download-artifact@v8
        with:
          pattern: harvest-output-*
          path: artifacts/harvest_output
          merge-multiple: true
      - name: Run ConsolidateHarvest
        run: >
          dotnet ./cake-host/Build.dll
          --target ConsolidateHarvest
      - name: Upload consolidated harvest
        uses: actions/upload-artifact@v7
        with:
          name: consolidated-harvest-output
          path: artifacts/harvest_output
          retention-days: 7

  pack:
    # Package the consolidated harvest output with the resolved versions mapping.
    # The resulting nupkgs feed consumer-smoke and the disabled publish stages.
    name: Pack
    needs: [build-cake-host, consolidate-harvest, resolve-versions]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/nuget-cache
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download consolidated harvest
        uses: actions/download-artifact@v8
        with:
          name: consolidated-harvest-output
          path: artifacts/harvest_output
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run Package
        run: >
          dotnet ./cake-host/Build.dll
          --target Package
          --versions-file artifacts/resolve-versions/versions.json
      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-output
          path: artifacts/packages/
          retention-days: 7

  consumer-smoke:
    # Re-enter the same RID matrix used by Harvest so each platform installs and
    # tests the packed artifacts under its own runtime/toolchain surface.
    name: ConsumerSmoke (${{ matrix.rid }})
    needs: [build-cake-host, pack, generate-matrix, resolve-versions]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          # Smoke project targets $(ExecutableTargetFrameworks) = net10.0;net9.0;net8.0;net462.
          # global.json only installs .NET 10 SDK — we need .NET 9 + .NET 8 runtime/SDK for
          # the net9.0 and net8.0 TFMs. net462 is handled natively on Windows, skipped on Linux,
          # probed-for-Mono on macOS (see PackageConsumerSmokeRunner.ShouldSkipTfm).
          # win-x86's extra x86 runtime bootstrap is owned by Cake
          # (Infrastructure/DotNet/DotNetRuntimeEnvironment), not inline YAML.
          dotnet-version: |
            9.0.x
            8.0.x
      - uses: ./.github/actions/nuget-cache
      - name: Enable TUnit HTML report auto-upload
        # Matrix-aware TUnit auto-upload: `Assembly-{os}-{tfm}-report.html`
        # filename keeps per-RID reports distinct in the workflow artifact UI.
        # The env vars flow through Cake → `dotnet test` (PackageConsumerSmoke)
        # via inheritance. See
        # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Cake Info
        run: >
          dotnet ./cake-host/Build.dll
          --target Info
          --rid ${{ matrix.rid }}
      - name: Download nupkg artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkg-output
          path: artifacts/packages
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run PackageConsumerSmoke
        run: >
          dotnet ./cake-host/Build.dll
          --target PackageConsumerSmoke
          --rid ${{ matrix.rid }}
          --versions-file artifacts/resolve-versions/versions.json

  publish-staging:
    # Pushes the packed nupkgs to the GitHub Packages internal feed (PD-5 write path).
    # Dispatch stays checkbox-gated. Release tags publish to the internal feed after
    # trigger-aware ResolveVersions routing emits tag-derived versions.json.
    # Per-job 'packages: write' override keeps every other job at the workflow-level
    # 'packages: read' default. PublishTaskRunner refuses to push 'local.*' prerelease
    # versions so a stray operator dispatch can never leak a local-pack into staging.
    name: Publish (Staging)
    needs: [consumer-smoke]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish-staging == true) || (github.event_name == 'push' && (startsWith(github.ref_name, 'sdl2-') || startsWith(github.ref_name, 'sdl3-') || startsWith(github.ref_name, 'train-'))) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download nupkg artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkg-output
          path: artifacts/packages
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run PublishStaging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet ./cake-host/Build.dll
          --target PublishStaging
          --versions-file artifacts/resolve-versions/versions.json

  # Phase 2b PD-7: stays disabled until promotion-to-nuget.org logic lands.
  publish-public:
    name: Publish (Public)
    needs: [publish-staging]
    if: false
    runs-on: ubuntu-24.04
    steps:
      - run: echo "publish-public is not yet implemented."
