# Janset.SDL2 / Janset.SDL3 release pipeline.
#
# Grows slice-by-slice alongside the ADR-003 Cake refactor:
#
#   Slice A (landed): trigger stanzas + stub resolve-versions-stub job.
#   Slice B1 (landed): resolve-versions + preflight jobs run real Cake targets.
#   Slice D (landed): generate-matrix job real; harvest (incl. native-smoke) /
#                     consolidate-harvest jobs first-draft (see WIP banner below).
#   Slice C (landed): pack + consumer-smoke (RID matrix re-entry) jobs +
#                     publish-staging / publish-public stubs (gated).
#   Slice E pass-1 (merged to master 2026-04-22 at bfc6713):
#     E1a (landed): build-cake-host job publishes the Cake host once as an
#           FDD artifact (runtimes/*/native/ bundled, -p:UseAppHost=false for
#           cross-OS `dotnet Build.dll` invocation). Consumer jobs download the
#           artifact and skip dotnet restore/build entirely.
#     E1b (landed): every consumer job rewired to `dotnet ./cake-host/Build.dll`.
#     E2 (landed): custom Ubuntu container image hosted on GHCR, built by a
#           dedicated companion workflow, replaces the in-job apt-install +
#           autoconf source-build preamble. focal-latest multi-arch manifest
#           list (amd64 + arm64); manifest.runtimes[].container_image points at it.
#   Slice E follow-up pass (master post-merge, 2026-04-22+, see plan §2.2):
#     P1 (landed): nuget-cache + platform-build-prereqs composite actions +
#           Build.Tests.csproj added to build/build.sln.
#     P2 (landed): build-cake-host → "Build + Test Cake Host" (solution-wide
#           restore → dotnet test with MTP coverage → publish → Coverage-Check
#           gate → upload cake-host + test-results artifacts).
#     P3 (landed): harvest job body gains platform-build-prereqs + vcpkg-setup +
#           nuget-cache composites (E1c core absorption).
#     P4 (landed): pack + consumer-smoke + consolidate-harvest + resolve-versions
#           + preflight + generate-matrix gain nuget-cache; consumer-smoke also
#           gains platform-build-prereqs (E1c tail).
#     P4e (landed): hygiene audit — drop nuget-cache from FDD-only jobs
#           (resolve-versions, preflight, generate-matrix, harvest,
#           consolidate-harvest). Cake.Frosting addins are compile-time bundled
#           into the published FDD, so those jobs do zero runtime NuGet work.
#           Drop platform-build-prereqs from consumer-smoke — brew autotools
#           are vcpkg port build-time deps, not consumer-side. nuget-cache
#           kept on build-cake-host (Build.Tests restore), pack (dotnet pack
#           internal restore), consumer-smoke (dotnet test internal restore).
#           platform-build-prereqs kept on harvest (macOS vcpkg ports need it).
#           setup-dotnet kept everywhere: non-negotiable on container jobs
#           (custom focal image has no .NET baked in by design), and on host
#           runners it pins to global.json (9.0.200) against rollForward drift
#           between pre-installed 9.0.x patches (ubuntu picks 9.0.312, windows-
#           11-arm 9.0.303 — setup-dotnet neutralises that).
#     P5: lock-file discipline (RestorePackagesWithLockFile + --locked-mode).
#     P6: PublishTask stubs (throws NotImplementedException; Phase-2b real impl).
#     P7: three-platform witness per cross-platform-smoke-validation.md A-K.
#     P8: retire prepare-native-assets-*.yml + release-candidate-pipeline.yml +
#           broader canonical-doc sweep + §11 Q17 delegate-hook ADR resolution.
#           Pass closure.
#
# Every `run:` block invokes a build-host Cake target (or minimal wiring logic — artifact
# download, JSON → --explicit-version expansion). Per ADR-003 §3.1 the build host owns policy;
# CI supplies trigger context + job graph only. Any `run:` block that grows beyond a single
# Cake invocation + artifact up/download + CLI-arg wiring is a review flag.
#
# NORTH-STAR REFERENCE (Slice D → Slice E CI absorption).
# ----------------------------------------------------------------------------
# The working CI harvest path today is the `prepare-native-assets-*.yml` reusable
# workflow family, invoked by `prepare-native-assets-main.yml` on workflow_dispatch.
# That family carries the full battle-tested prereq + cache + submodule discipline
# this release.yml must absorb before going live on tag pushes:
#
#   (i)   Linux container apt prereqs (build-essential, SDL2 video/audio backends,
#         freepats for Timidity MIDI, autoconf 2.72 source build on ubuntu:20.04 —
#         see prepare-native-assets-linux.yml steps). `freepats` is *required* for
#         NativeSmoke "Mix decoder: MIDI" to pass — see the inline comment in
#         prepare-native-assets-linux.yml and docs/playbook/cross-platform-smoke-validation.md.
#   (ii)  vcpkg-setup composite action (.github/actions/vcpkg-setup) — submodule
#         commit + overlay triplet/port hash keying, bootstrap, binary cache.
#   (iii) actions/checkout with submodules: recursive + fetch-depth: 0 for the
#         vcpkg submodule + git-tag / MinVer provenance.
#   (iv)  workspace-local NuGet cache (NUGET_PACKAGES env + actions/cache).
#   (v)   Cake host compiled once (dotnet build) and invoked many times via the
#         built `Build` executable — NOT `dotnet run` per target.
#   (vi)  --repo-root "$(pwd)" on Unix; shell defaults per platform (bash vs pwsh).
#   (vii) Artifact name convention harvested-assets-{os}-{rid} (prepare-*'s shape).
#
# The Slice D first-draft harvest / consolidate-harvest job bodies below are
# intentionally minimal: they exercise the Cake target shape + matrix wiring +
# artifact-upload contract, but they do NOT yet carry points (i)–(vii).
# NativeSmoke was absorbed into the Harvest job (Slice E P4c) — no separate job.
# Until Slice E absorbs the prepare-* family into these matrix-driven jobs, the
# operator-facing CI harvest path remains `prepare-native-assets-main.yml`
# (workflow_dispatch). Release-tag pushes (`sdl2-*-*.*.*`, `sdl3-*-*.*.*`,
# `train-*`) also remain gated behind Slice E closure — no tag should be pushed
# until this file's job bodies reach prepare-*-parity.
#
# Slice E scope items (tracked in docs/phases/phase-2-release-cycle-orchestration-implementation-plan.md §6.6):
#   E1. Rewrite harvest / consolidate-harvest jobs here to dispatch
#       per-platform reusable workflows (prepare-native-assets-windows/linux/macos.yml,
#       possibly renamed) via `uses:` + matrix-derived inputs from generate-matrix.
#       The reusable workflows keep the vcpkg-setup composite + NuGet cache + Cake
#       compile-once discipline; release.yml stays the thin dispatcher.
#   E2. Move the Linux apt-prereq preamble (and the autoconf-2.72 source build) out
#       of the workflow file entirely: bake them into a pinned custom Ubuntu image
#       hosted on ghcr.io/janset2d/sdl2-bindings-linux-builder:<tag>. Image built
#       by a dedicated `build-linux-container.yml` workflow (cadence: manual
#       dispatch + scheduled rebuild; multi-arch for linux-x64 + linux-arm64).
#       Container version pinned in manifest.runtimes[].container_image so a
#       single manifest edit drives both the image reference and the matrix shape.
#   E3. Retire prepare-native-assets-*.yml (or narrow them to a callable harvest-only
#       shape that release.yml delegates to).
#
# Until E1-E3 land, DO NOT push a release tag — CI will fail on the first Linux
# matrix entry because the apt prereqs + vcpkg cache + submodule recursion may
# still be incomplete in the job bodies below.
# ----------------------------------------------------------------------------
#
# See docs/phases/phase-2-release-cycle-orchestration-implementation-plan.md for the full plan.
# Cross-reference: docs/decisions/2026-04-20-release-lifecycle-orchestration.md §3.4.

name: Release

on:
  push:
    tags:
      - 'sdl2-*-*.*.*'    # targeted family release (e.g., sdl2-core-2.32.0)
      - 'sdl3-*-*.*.*'    # targeted family release, SDL3 line (future)
      - 'train-*'         # full-train coordinated release (Phase 2b; mechanism deferred)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Version source: manifest-derived | explicit'
        type: choice
        required: true
        default: manifest-derived
        options:
          - manifest-derived
          - explicit
      explicit-versions:
        description: 'For mode=explicit: sdl2-core=2.32.0,sdl2-image=2.8.0,... (repeated --explicit-version shape)'
        required: false

permissions:
  contents: read
  packages: read

jobs:
  build-cake-host:
    # Slice E E1a + follow-up pass P2 (2026-04-22): build + test + publish the
    # Cake host once per pipeline run and distribute the output as a workflow
    # artifact. Downstream jobs skip `dotnet restore/build/test` entirely and
    # invoke `dotnet ./cake-host/Build.dll --target X`.
    #
    # Shape: framework-dependent deployment (FDD) with `-p:UseAppHost=false` — no
    # platform-specific launcher is emitted, so the single artifact runs on every
    # consumer job (Windows / Linux / macOS) through the `dotnet` host installed
    # by `actions/setup-dotnet`. `dotnet publish` bundles `runtimes/*/native/` for
    # every RID surfaced by the NuGet graph (notably LibGit2Sharp's per-OS
    # `git2-*.{so,dylib,dll}` via Cake.Frosting.Git), so the runtime dispatcher
    # picks the right native on each consumer OS.
    #
    # Tests + Coverage-Check run as part of this job so regression coverage for
    # the Cake host is CI-backed (not local-host-only). Coverage extension is
    # TUnit + Microsoft.Testing.Platform's built-in `--coverage` output; the
    # cobertura xml lands at `artifacts/test-results/build-tests/coverage.cobertura.xml`
    # where `CoverageCheckTaskRunner.DefaultCoverageRelativePath` expects it.
    #
    # Job ID (`build-cake-host`) is intentionally unchanged from pass-1 so every
    # consumer job's `needs: [build-cake-host, ...]` clause stays intact.
    #
    # vcpkg submodule is deliberately skipped here — Cake host compiles against
    # Vcpkg config only (`context.Vcpkg.*`) and never links against vcpkg-produced
    # binaries at build / test time; submodule recursion happens on jobs that
    # actually run Harvest / NativeSmoke.
    #
    # Retention is run-scoped (1 day): determinism > cross-run reuse. Each
    # pipeline run re-builds the Cake host; content-addressed caching would save
    # ~30s per run at the cost of debug-time confusion about which commit's host
    # ran.
    name: Build + Test Cake Host
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/nuget-cache
      - name: Enable TUnit HTML report auto-upload
        # TUnit generates `TestResults/{Assembly}-{os}-{tfm}-report.html` by
        # default and uploads it as a workflow artifact IF these two GitHub
        # Actions runtime env vars are exposed. Option A from
        # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
        # — removes the need for a manual actions/upload-artifact step for the
        # report. Matrix jobs auto-deduplicate via the OS/TFM in the filename.
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - name: Restore Build.Tests (transitive covers Build.csproj)
        # Targeted to the test project — NOT a solution-wide restore. `build/build.sln`
        # currently carries only Build + Build.Tests but future additions (extra test
        # projects, samples) would pull in work we don't want here. Build.Tests
        # ProjectReference'es Build.csproj so its restore graph covers the Cake host.
        run: dotnet restore build/_build.Tests/Build.Tests.csproj
      - name: Test Cake host (with coverage)
        # TUnit + MTP `--coverage` cobertura output path must be absolute; with a
        # relative path MTP writes under the test executable's bin dir instead of
        # the repo-root-relative path CoverageCheckTaskRunner expects.
        run: >
          dotnet test build/_build.Tests/Build.Tests.csproj
          --configuration Release
          --no-restore
          --
          --coverage
          --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/artifacts/test-results/build-tests/coverage.cobertura.xml
      - name: Publish Cake host (FDD, cross-OS)
        run: >
          dotnet publish build/_build/Build.csproj
          --configuration Release
          --no-restore
          -p:UseAppHost=false
          --output ./out/cake-host
      - name: Coverage-Check (ratchet against build/coverage-baseline.json)
        run: dotnet ./out/cake-host/Build.dll --target Coverage-Check
      - name: Upload cake-host artifact
        uses: actions/upload-artifact@v7
        with:
          name: cake-host
          path: ./out/cake-host
          if-no-files-found: error
          retention-days: 1
      # TUnit HTML report uploads itself via ACTIONS_RUNTIME_TOKEN exported above;
      # we only need to surface the cobertura coverage xml manually since the
      # Coverage-Check gate consumes it and a human reader may want the raw data.
      - name: Upload coverage artifact (cobertura xml)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: artifacts/test-results/build-tests/coverage.cobertura.xml
          if-no-files-found: warn
          retention-days: 7

  resolve-versions:
    # Slice B1: manifest source live; git-tag / meta-tag sources land in Slice C.
    # Emits artifacts/resolve-versions/versions.json in the canonical flat shape:
    #   { "sdl2-core": "2.32.0-ci.<run-id>.<run-attempt>", ... }
    # Uploaded as a workflow artifact so downstream jobs consume via actions/download-artifact.
    name: Resolve Versions
    needs: [build-cake-host]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Resolve manifest versions
        run: >
          dotnet ./cake-host/Build.dll
          --target ResolveVersions
          --version-source=manifest
          --suffix=ci.${{ github.run_id }}.${{ github.run_attempt }}
      - name: Upload versions.json
        uses: actions/upload-artifact@v7
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions/versions.json
          retention-days: 7

  preflight:
    # Slice B1: PreFlight consumes the resolved mapping via --explicit-version per ADR-003
    # §2.3 (version-aware by contract). The JSON → CLI expansion is minimal wiring, not
    # policy; every validated rule lives inside the Cake PreFlightCheck target.
    name: PreFlight
    needs: [build-cake-host, resolve-versions]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run PreFlightCheck
        run: >
          dotnet ./cake-host/Build.dll
          --target PreFlightCheck
          --versions-file artifacts/resolve-versions/versions.json

  generate-matrix:
    # Slice D: emits the full 7-RID matrix (one entry per manifest.runtimes[]) via
    # GenerateMatrixTask. The harvest job (which also runs NativeSmoke inline) and
    # consumer-smoke both read the same matrix — per ADR-003 §3.4 and the 2026-04-21
    # symmetric pivot.
    name: Generate Matrix
    needs: [build-cake-host]
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Emit matrix JSON
        run: >
          dotnet ./cake-host/Build.dll
          --target GenerateMatrix
      - name: Expose matrix as job output
        id: matrix
        run: |
          # GitHub Actions matrix expansion reads the include[] array verbatim.
          matrix_json=$(jq -c . artifacts/matrix/runtimes.json)
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"
      - name: Upload matrix artifact
        uses: actions/upload-artifact@v7
        with:
          name: generate-matrix-output
          path: artifacts/matrix/runtimes.json
          retention-days: 7

  harvest:
    # FIRST-DRAFT — Slice E absorbs prepare-native-assets-{windows,linux,macos}.yml
    # into this job. NativeSmoke absorbed here (P4c) — runs right after Harvest on
    # the same runner, no artifact round-trip. See the NORTH-STAR REFERENCE block
    # at the top of this file + plan §6.6 E1-E3.
    name: Harvest + NativeSmoke (${{ matrix.rid }})
    needs: [build-cake-host, preflight, generate-matrix]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/platform-build-prereqs
      - uses: ./.github/actions/vcpkg-setup
        with:
          # Single execution-surface identity: host jobs use the runner label, container
          # jobs use the declared image ref. vcpkg-setup decides whether to resolve the
          # value to an immutable digest by probing the current job-container environment.
          platform-identity: ${{ matrix.container_image || matrix.runner }}
          triplet: ${{ matrix.triplet }}
          vcpkg-cache-path: .vcpkg-cache
          vcpkg-feature-flags: binarycaching
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Cake Info
        run: >
          dotnet ./cake-host/Build.dll
          --target Info
          --rid ${{ matrix.rid }}
      - name: Run Harvest
        run: >
          dotnet ./cake-host/Build.dll
          --target Harvest
          --rid ${{ matrix.rid }}
      - name: Run NativeSmoke
        # Absorbed from the former standalone native-smoke job (Slice E P4c).
        # Harvest output is already on disk — no artifact round-trip needed.
        # The four PA-2 RIDs (win-arm64, win-x86, linux-arm64, osx-arm64) will
        # fail at `cmake --preset <rid>` until CMakePresets.json grows in
        # Phase 2b — that expected-failure surface IS the PA-2 witness signal,
        # not a code-level cap. See plan §11 Q9 + §6.3.
        run: >
          dotnet ./cake-host/Build.dll
          --target NativeSmoke
          --rid ${{ matrix.rid }}
      - name: Upload harvest output
        uses: actions/upload-artifact@v7
        with:
          name: harvest-output-${{ matrix.rid }}
          path: artifacts/harvest_output
          retention-days: 7

  consolidate-harvest:
    # FIRST-DRAFT (see NORTH-STAR REFERENCE + plan §6.6 E1-E3 for absorption scope).
    # Slice E aligns the download-artifact pattern with the prepare-*'s
    # `harvested-assets-{os}-{rid}` naming convention — today's `harvest-output-{rid}`
    # shape is a placeholder.
    #
    # Aggregation runner per ADR-003 §3.5 — downloads every RID's harvest output, then invokes
    # ConsolidateHarvest once to union license evidence + produce the cross-RID manifests.
    name: ConsolidateHarvest
    needs: [build-cake-host, harvest]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download every RID's harvest output
        uses: actions/download-artifact@v8
        with:
          pattern: harvest-output-*
          path: artifacts/harvest_output
          merge-multiple: true
      - name: Run ConsolidateHarvest
        run: >
          dotnet ./cake-host/Build.dll
          --target ConsolidateHarvest
      - name: Upload consolidated harvest
        uses: actions/upload-artifact@v7
        with:
          name: consolidated-harvest-output
          path: artifacts/harvest_output
          retention-days: 7

  pack:
    # Slice C: single-runner packing — downloads the consolidated harvest + resolved
    # versions, then invokes Package with --explicit-version per-family. The output
    # nupkgs feed the consumer-smoke matrix and (future Slice E) publish jobs.
    name: Pack
    needs: [build-cake-host, consolidate-harvest, resolve-versions]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - uses: ./.github/actions/nuget-cache
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Download consolidated harvest
        uses: actions/download-artifact@v8
        with:
          name: consolidated-harvest-output
          path: artifacts/harvest_output
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run Package
        run: >
          dotnet ./cake-host/Build.dll
          --target Package
          --versions-file artifacts/resolve-versions/versions.json
      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nupkg-output
          path: artifacts/packages/
          retention-days: 7

  consumer-smoke:
    # Slice C: 7-RID matrix re-entry — each runner downloads the packed nupkgs + resolved
    # versions, then invokes PackageConsumerSmoke with --explicit-version + --rid per ADR-003
    # §2.3. The consumer-smoke matrix is symmetric with harvest (same generate-matrix output).
    #
    # FIRST-DRAFT (see NORTH-STAR REFERENCE + plan §6.6 E1-E3 for absorption scope).
    # Missing apt prereqs / vcpkg-setup / NuGet cache on Linux/macOS entries — same caveat
    # as the harvest / native-smoke jobs above. Fully functional only after Slice E.
    name: ConsumerSmoke (${{ matrix.rid }})
    needs: [build-cake-host, pack, generate-matrix, resolve-versions]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          # Smoke project targets $(ExecutableTargetFrameworks) = net9.0;net8.0;net462.
          # global.json only installs .NET 9 SDK — we need .NET 8 runtime/SDK for
          # the net8.0 TFM. net462 is handled natively on Windows, skipped on Linux,
          # probed-for-Mono on macOS (see PackageConsumerSmokeRunner.ShouldSkipTfm).
          # win-x86's extra x86 runtime bootstrap is owned by Cake
          # (Infrastructure/DotNet/DotNetRuntimeEnvironment), not inline YAML.
          dotnet-version: |
            8.0.x
      - uses: ./.github/actions/nuget-cache
      - name: Enable TUnit HTML report auto-upload
        # Matrix-aware TUnit auto-upload: `Assembly-{os}-{tfm}-report.html`
        # filename keeps per-RID reports distinct in the workflow artifact UI.
        # The env vars flow through Cake → `dotnet test` (PackageConsumerSmoke)
        # via inheritance. See
        # https://tunit.dev/docs/guides/html-report/#enabling-automatic-artifact-upload
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);
      - uses: actions/download-artifact@v8
        with:
          name: cake-host
          path: ./cake-host
      - name: Cake Info
        run: >
          dotnet ./cake-host/Build.dll
          --target Info
          --rid ${{ matrix.rid }}
      - name: Download nupkg artifacts
        uses: actions/download-artifact@v8
        with:
          name: nupkg-output
          path: artifacts/packages
      - name: Download versions.json
        uses: actions/download-artifact@v8
        with:
          name: resolve-versions-output
          path: artifacts/resolve-versions
      - name: Run PackageConsumerSmoke
        run: >
          dotnet ./cake-host/Build.dll
          --target PackageConsumerSmoke
          --rid ${{ matrix.rid }}
          --versions-file artifacts/resolve-versions/versions.json

  # ---------------------------------------------------------------------------
  # Publish stubs — Slice E wires real bodies; gated behind Phase 2b.
  # ---------------------------------------------------------------------------
  publish-staging:
    name: Publish (Staging)
    needs: [consumer-smoke]
    if: false  # Gated — Slice E + Phase 2b
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Phase 2b — publish-staging not yet implemented."

  publish-public:
    name: Publish (Public)
    needs: [publish-staging]
    if: false  # Gated — Slice E + Phase 2b
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Phase 2b — publish-public not yet implemented."
