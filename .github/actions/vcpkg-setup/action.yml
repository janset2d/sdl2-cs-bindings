name: "Vcpkg Setup"
description: "Checks out code, sets up vcpkg cache, installs prerequisites, bootstraps vcpkg, and installs dependencies."

inputs:
  platform-identity:
    description: "Execution-surface identity for the cache key: runner label on host jobs, container image ref on container jobs."
    required: true
  cache-key-suffix:
    description: "Optional suffix appended after platform identity, for one-off cache busts."
    required: false
  triplet:
    description: "The vcpkg triplet to build for"
    required: true
  vcpkg-cache-path:
    description: "Relative path for the vcpkg binary cache (e.g., .vcpkg-cache)"
    required: true
  vcpkg-feature-flags:
    description: "Vcpkg feature flags to enable"
    required: true

runs:
  using: "composite"
  steps:
    # ──────────────────────────────────────────────────────────────────────────
    # 0 ▸ detect whether the current script step is running inside a job
    #     container. Primary signal: job.container.id (GitHub context). Fallback:
    #     /.dockerenv or /run/.containerenv for shell-level portability.
    # ──────────────────────────────────────────────────────────────────────────
    - name: Detect job container
      if: runner.os != 'Windows'
      id: container_probe
      shell: bash
      env:
        JOB_CONTAINER_ID: ${{ job.container.id }}
      run: |
        set -euo pipefail

        if [[ -n "${JOB_CONTAINER_ID:-}" ]] || [[ -f "/.dockerenv" ]] || [[ -f "/run/.containerenv" ]]; then
          echo "in-container=true" >> "$GITHUB_OUTPUT"
        else
          echo "in-container=false" >> "$GITHUB_OUTPUT"
        fi

    # ──────────────────────────────────────────────────────────────────────────
    # 1 ▸ derive an immutable cache identity from the declared job container
    #     image when the caller is running inside a GHCR-backed job container.
    #     Host jobs skip this step and use the raw runner label as-is.
    # ──────────────────────────────────────────────────────────────────────────
    - name: Resolve immutable container cache identity (GHCR)
      if: runner.os != 'Windows' && steps.container_probe.outputs.in-container == 'true' && inputs.platform-identity != ''
      id: container_identity
      shell: bash
      env:
        PLATFORM_IDENTITY: ${{ inputs.platform-identity }}
        CACHE_KEY_SUFFIX: ${{ inputs.cache-key-suffix }}
        GHCR_ACTOR: ${{ github.actor }}
        GHCR_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        image="$PLATFORM_IDENTITY"
        suffix="${CACHE_KEY_SUFFIX:-}"

        if [[ "$image" == *@sha256:* ]]; then
          echo "platform-identity=${image}${suffix}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        case "$image" in
          ghcr.io/*:*)
            repo_and_tag="${image#ghcr.io/}"
            repository="${repo_and_tag%:*}"
            reference="${repo_and_tag##*:}"
            ;;
          *)
            echo "Container image '$image' is not a GHCR tag. Falling back to the raw image ref for cache identity."
            echo "platform-identity=${image}${suffix}" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac

        auth_args=()
        if [[ -n "${GHCR_ACTOR:-}" && -n "${GHCR_TOKEN:-}" ]]; then
          auth_args=(-u "${GHCR_ACTOR}:${GHCR_TOKEN}")
        fi

        token_response="$(curl -fsSL "${auth_args[@]}" "https://ghcr.io/token?service=ghcr.io&scope=repository:${repository}:pull")"
        token="$(printf '%s' "$token_response" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')"

        if [[ -z "$token" ]]; then
          echo "Failed to resolve GHCR bearer token for $repository" >&2
          exit 1
        fi

        headers="$(curl -fsSI \
          -H "Authorization: Bearer $token" \
          -H "Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json" \
          "https://ghcr.io/v2/${repository}/manifests/${reference}")"

        digest="$(printf '%s\n' "$headers" | tr -d '\r' | awk -F': ' 'tolower($1) == "docker-content-digest" { print $2 }')"
        if [[ -z "$digest" ]]; then
          echo "Failed to resolve container digest for $image" >&2
          printf '%s\n' "$headers" >&2
          exit 1
        fi

        identity="ghcr.io/${repository}@${digest}${suffix}"
        echo "Resolved immutable cache identity: $identity"
        echo "platform-identity=$identity" >> "$GITHUB_OUTPUT"

    # ──────────────────────────────────────────────────────────────────────────
    # 2 ▸ grab the sub‐module commit so the cache busts when vcpkg updates
    # ──────────────────────────────────────────────────────────────────────────
    - name: Read vcpkg submodule commit
      id: vcpkg_commit
      shell: bash
      run: echo "commit=$(git -C $GITHUB_WORKSPACE/external/vcpkg rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    # ──────────────────────────────────────────────────────────────────────────
    # 3 ▸ binary‐caching
    # ──────────────────────────────────────────────────────────────────────────
    - name: Cache vcpkg binary artifacts
      id: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/${{ inputs.vcpkg-cache-path }}
        # Key includes vcpkg.json AND the full overlay-triplets + overlay-ports trees so
        # edits to triplet regex / port feature flags bust the GitHub Actions cache as
        # well as vcpkg's internal ABI hash. Without hashing overlays here, a hybrid
        # triplet tweak could restore a stale cache blob that happens to match the
        # unchanged vcpkg.json key, producing cold-build misses only when vcpkg's own
        # ABI layer rejects the stored artifacts.
        key: vcpkg-bin-${{ steps.container_identity.outputs.platform-identity || format('{0}{1}', inputs.platform-identity, inputs.cache-key-suffix || '') }}-${{ inputs.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-overlay-triplets/**', 'vcpkg-overlay-ports/**') }}-${{ steps.vcpkg_commit.outputs.commit }}
        restore-keys: |
          vcpkg-bin-${{ steps.container_identity.outputs.platform-identity || format('{0}{1}', inputs.platform-identity, inputs.cache-key-suffix || '') }}-${{ inputs.triplet }}-${{ hashFiles('vcpkg.json', 'vcpkg-overlay-triplets/**', 'vcpkg-overlay-ports/**') }}-
      env:
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/${{ inputs.vcpkg-cache-path }}

    # ──────────────────────────────────────────────────────────────────────────
    # 4 ▸ make sure the directory exists (only needed on a full cache miss)
    # ──────────────────────────────────────────────────────────────────────────
    - name: Ensure binary‑cache directory exists (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\${{ inputs.vcpkg-cache-path }}" | Out-Null

    - name: Ensure binary‑cache directory exists (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: mkdir -p "$GITHUB_WORKSPACE/${{ inputs.vcpkg-cache-path }}"

    # ──────────────────────────────────────────────────────────────────────────
    # 5 ▸ bootstrap vcpkg
    # ──────────────────────────────────────────────────────────────────────────
    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "$env:GITHUB_WORKSPACE\external\vcpkg\bootstrap-vcpkg.bat"

    - name: Bootstrap vcpkg (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        $GITHUB_WORKSPACE/external/vcpkg/bootstrap-vcpkg.sh

    # ──────────────────────────────────────────────────────────────────────────
    # 6 ▸ install manifest dependencies
    # ──────────────────────────────────────────────────────────────────────────
    - name: Install dependencies using vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $overlayArgs = @()
        $overlayTripletsPath = "$env:GITHUB_WORKSPACE\vcpkg-overlay-triplets"
        if (Test-Path $overlayTripletsPath) { $overlayArgs += "--overlay-triplets=$overlayTripletsPath" }
        $overlayPortsPath = "$env:GITHUB_WORKSPACE\vcpkg-overlay-ports"
        if (Test-Path $overlayPortsPath) { $overlayArgs += "--overlay-ports=$overlayPortsPath" }
        & "$env:GITHUB_WORKSPACE\external\vcpkg\vcpkg.exe" install --triplet ${{ inputs.triplet }} @overlayArgs
      env:
        VCPKG_FEATURE_FLAGS: ${{ inputs.vcpkg-feature-flags }}
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/${{ inputs.vcpkg-cache-path }}

    - name: Install dependencies using vcpkg (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        OVERLAY_ARGS=()
        if [ -d "$GITHUB_WORKSPACE/vcpkg-overlay-triplets" ]; then
          OVERLAY_ARGS+=("--overlay-triplets=$GITHUB_WORKSPACE/vcpkg-overlay-triplets")
        fi
        if [ -d "$GITHUB_WORKSPACE/vcpkg-overlay-ports" ]; then
          OVERLAY_ARGS+=("--overlay-ports=$GITHUB_WORKSPACE/vcpkg-overlay-ports")
        fi
        $GITHUB_WORKSPACE/external/vcpkg/vcpkg install --triplet ${{ inputs.triplet }} "${OVERLAY_ARGS[@]}"
      env:
        VCPKG_FEATURE_FLAGS: ${{ inputs.vcpkg-feature-flags }}
        VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/${{ inputs.vcpkg-cache-path }}
