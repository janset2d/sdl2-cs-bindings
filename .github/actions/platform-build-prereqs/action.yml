name: "Platform Build Prereqs"
description: >
  Installs platform-specific native build prerequisites (autotools, pkg-config,
  etc.) required by vcpkg hybrid-static SDL2 ports. Linux and Windows are
  no-ops: the custom GHCR builder image (docker/linux-builder.Dockerfile)
  bakes every Linux prereq, and on Windows the Cake host's IMsvcDevEnvironment
  self-sources the MSVC toolchain. Only macOS still needs an
  at-job-time brew install because we do not own a macOS base image.

runs:
  using: "composite"
  steps:
    # macOS still needs Homebrew-installed autotools packages for some vcpkg ports.
    # The per-formula check keeps the step quiet on runner images that already
    # have these formulas preinstalled.
    - name: Homebrew prereqs (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update --quiet || true  # best-effort; brew outages shouldn't fail the job
        for formula in pkg-config autoconf automake libtool; do
          if brew list --formula "$formula" >/dev/null 2>&1; then
            echo "✓ $formula already installed"
          else
            echo "→ installing $formula"
            brew install --formula "$formula"
          fi
        done

    # Linux: no-op. The builder image already contains the native build toolchain.
    - name: Linux prereqs (no-op, baked into ghcr.io/janset2d/sdl2-bindings-linux-builder)
      if: runner.os == 'Linux'
      shell: bash
      run: 'echo "Linux prereqs are baked into the container image; nothing to install at job-time."'

    # Windows: no-op. The Cake host sources vcvarsall and populates CMAKE_*
    # variables from the installed Visual Studio toolchain.
    - name: Windows prereqs (no-op, MSVC self-sourced by IMsvcDevEnvironment)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'Write-Host "Windows prereqs are self-sourced by the Cake host at NativeSmoke/Harvest time; nothing to install."'
