name: "Platform Build Prereqs"
description: >
  Installs platform-specific native build prerequisites (autotools, pkg-config,
  etc.) required by vcpkg hybrid-static SDL2 ports. Linux and Windows are
  no-ops: the custom GHCR builder image (docker/linux-builder.Dockerfile)
  bakes every Linux prereq, and on Windows the Cake host's IMsvcDevEnvironment
  (Slice CA) self-sources the MSVC toolchain. Only macOS still needs an
  at-job-time brew install because we do not own a macOS base image.

runs:
  using: "composite"
  steps:
    # ──────────────────────────────────────────────────────────────────────────
    # macOS — brew preamble mirrors prepare-native-assets-macos.yml:31-35.
    # `pkg-config autoconf automake libtool` cover every vcpkg port's
    # autotools expectation. cmake comes from vcpkg's own bundled download
    # on macOS so is deliberately not installed here.
    # ──────────────────────────────────────────────────────────────────────────
    - name: Homebrew prereqs (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update || true  # best-effort; brew outages shouldn't fail the job
        brew install pkg-config autoconf automake libtool

    # Linux: no-op. docker/linux-builder.Dockerfile bakes every apt package
    # (build-essential + SDL2 backends + freepats + libicu + autoconf-2.72 +
    # cmake + ninja + git with safe.directory). See Slice E E2 + prepare-*-linux.yml:37-80.
    - name: Linux prereqs (no-op, baked into ghcr.io/janset2d/sdl2-bindings-linux-builder)
      if: runner.os == 'Linux'
      shell: bash
      run: 'echo "Linux prereqs are baked into the container image; nothing to install at job-time."'

    # Windows: no-op. PackageConsumerSmoke's Cake host uses IMsvcDevEnvironment
    # (Application/Tools/Msvc, Slice CA) to self-source vcvarsall + populate
    # CMAKE_* env from VS installation discovered via vswhere.
    - name: Windows prereqs (no-op, MSVC self-sourced by IMsvcDevEnvironment)
      if: runner.os == 'Windows'
      shell: pwsh
      run: 'Write-Host "Windows prereqs are self-sourced by the Cake host at NativeSmoke/Harvest time; nothing to install."'
